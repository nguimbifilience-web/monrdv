[phases.setup]
nixPkgs = ["...", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.exif", "php84Extensions.pcntl", "php84Extensions.bcmath", "php84Extensions.gd"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
