[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.exif", "php84Extensions.pcntl", "php84Extensions.bcmath", "php84Extensions.gd", "php84Extensions.sockets", "php84Packages.composer"]
nixLibs = ["glibcLocales"]

[phases.build]
cmds = [
    "cp .env.example .env || true",
    "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
    "php artisan package:discover --ansi",
    "npm install",
    "npm run build",
    "php artisan key:generate --force"
]

[phases.install]
cmds = ["npm ci"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"

[variables]
NIXPACKS_PHP_VERSION = "8.4"
